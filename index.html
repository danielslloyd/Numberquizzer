<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Flash Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div class="container">
            <h1 class="app-title">Math<br>Flash Cards</h1>

            <div id="best-score-display" class="best-score">
                <span class="best-label">BEST TIME</span>
                <span id="best-time-home" class="best-value">--:--</span>
            </div>

            <div class="settings">
                <div class="setting-row">
                    <label for="operation">Operation</label>
                    <select id="operation" class="setting-select">
                        <option value="addition">+  Addition</option>
                        <option value="subtraction">−  Subtraction</option>
                        <option value="multiplication">×  Multiplication</option>
                        <option value="division">÷  Division</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="max-number">Numbers up to</label>
                    <select id="max-number" class="setting-select">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="question-count">Questions</label>
                    <select id="question-count" class="setting-select">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

            <button id="start-btn" class="btn btn-primary">Start</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-top-bar">
            <div id="progress-display" class="progress-display">1 / 10</div>
            <div id="timer-display" class="timer-display">00:00</div>
        </div>

        <div class="quiz-body">
            <div id="question-display" class="question-display"></div>

            <!-- Speech UI (default) -->
            <div class="mic-section" id="mic-section">
                <button id="mic-btn" class="mic-btn" aria-label="Microphone active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <p id="listening-text" class="listening-text"></p>
            </div>

            <!-- Typed fallback (shown only if speech unsupported) -->
            <div class="answer-row hidden" id="typed-section">
                <input
                    type="number"
                    id="answer-input"
                    class="answer-input"
                    placeholder="?"
                    min="0"
                    autocomplete="off"
                >
                <button id="submit-btn" class="btn btn-primary submit-btn">OK</button>
            </div>

            <div id="feedback-display" class="feedback-display"></div>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
        <div class="container">
            <h1 id="results-title" class="results-title">Done!</h1>

            <div class="results-stats">
                <div class="stat">
                    <div class="stat-label">Your Time</div>
                    <div id="final-time" class="stat-value">00:00</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Questions</div>
                    <div id="final-score" class="stat-value">10 / 10</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Best Time</div>
                    <div id="best-time-results" class="stat-value">--:--</div>
                </div>
            </div>

            <div id="new-record-badge" class="new-record hidden">New Best Time!</div>

            <div class="results-actions">
                <button id="play-again-btn" class="btn btn-primary">Play Again</button>
                <button id="home-btn" class="btn btn-secondary">Home</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
