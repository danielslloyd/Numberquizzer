<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Flash Cards 2026-03-31</title>
    <link rel="stylesheet" href="styles.css?v=8079030">
</head>
<body>

    <!-- Settings widget — fixed top-right, home screen only -->
    <div id="settings-widget" class="settings-widget hidden">
        <button id="settings-btn" class="settings-btn" aria-label="Settings">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
                <line x1="1" y1="1"  x2="21" y2="1"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="1" y1="8"  x2="21" y2="8"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="1" y1="15" x2="21" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div id="settings-panel" class="settings-panel hidden">
            <div class="panel-row">
                <span>Shuffle deck</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="shuffle-toggle" checked>
                    <span class="toggle-track"></span>
                </label>
            </div>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div class="container">
            <h1 class="app-title">Math<br>Flash Cards</h1>

            <div id="best-score-display" class="best-score">
                <span class="best-label">BEST TIME</span>
                <span id="best-time-home" class="best-value">--:--</span>
            </div>

            <div class="settings">
                <div class="setting-block">
                    <div class="setting-block-label">Operations</div>
                    <div class="op-toggles" id="op-toggles">
                        <button class="op-toggle active" data-op="addition">+</button>
                        <button class="op-toggle" data-op="subtraction">−</button>
                        <button class="op-toggle" data-op="multiplication">×</button>
                        <button class="op-toggle" data-op="division">÷</button>
                    </div>
                </div>
                <div class="setting-row">
                    <label for="max-number">Numbers up to</label>
                    <select id="max-number" class="setting-select">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

            <button id="start-btn" class="btn btn-primary">Start</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-top-bar">
            <div id="progress-display" class="progress-display">1 / 10</div>
            <div id="timer-display" class="timer-display">00:00</div>
            <button id="mic-btn" class="mic-btn hidden" aria-label="Microphone active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
        </div>

        <div class="quiz-body">
            <div id="question-display" class="question-display"></div>

            <p id="listening-text" class="listening-text"></p>

            <!-- Typed fallback (shown only if speech unsupported) -->
            <div class="answer-row hidden" id="typed-section">
                <input
                    type="number"
                    id="answer-input"
                    class="answer-input"
                    placeholder="?"
                    min="0"
                    autocomplete="off"
                >
                <button id="submit-btn" class="btn btn-primary submit-btn">OK</button>
            </div>

            <div id="feedback-display" class="feedback-display"></div>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
        <div class="container">
            <h1 id="results-title" class="results-title">Done!</h1>

            <div class="results-stats">
                <div class="stat">
                    <div class="stat-label">Your Time</div>
                    <div id="final-time" class="stat-value">00:00</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div id="final-score" class="stat-value">10 / 10</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Best Time</div>
                    <div id="best-time-results" class="stat-value">--:--</div>
                </div>
            </div>

            <div id="new-record-badge" class="new-record hidden">New Best Time!</div>

            <div class="results-actions">
                <button id="play-again-btn" class="btn btn-primary">Play Again</button>
                <button id="home-btn" class="btn btn-secondary">Home</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=8079030"></script>
</body>
</html>
